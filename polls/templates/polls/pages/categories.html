{% extends "polls/layouts/base_app.html" %}
{% block content %}
  <div class="page-card">
    <div class="page-card__actions">
      <a href="{% url 'category_add' %}">Add category</a>
    </div>
    <table class="cafe-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Created</th>
        </tr>
      </thead>
      <tbody>
        {% for cat in categories %}
        <tr>
          <td><a href="{% url 'category_edit' cat.pk %}">{{ cat.pk }}</a></td>
          <td>{{ cat.name }}</td>
          <td>{{ cat.created_at|date:"Y-m-d" }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="3" class="cafe-muted">No categories yet. Use “Add category” in the sidebar.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
